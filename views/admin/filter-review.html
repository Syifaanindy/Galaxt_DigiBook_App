<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Filter Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../../assets/css/admin/panel.css">
</head>
<body>
  <div class="admin-layout">
    <div id="admin-sidebar"></div>

    <main class="main-content">
      

      <section class="panel">
        <h3>Filter Berdasarkan Nama Buku</h3>
        <form id="filterForm" class="form-grid">
          <div class="field">
            <label for="bookFilter">Nama Buku</label>
            <input id="bookFilter" type="text" placeholder="Contoh: Makrifat Daun">
          </div>
          <div class="field" style="justify-content:end;">
            <label>&nbsp;</label>
            <div class="actions">
              <button class="btn btn-primary" type="submit">Cari Review</button>
              <button id="resetFilter" class="btn btn-soft" type="button">Reset</button>
            </div>
          </div>
        </form>
      </section>

      <section class="panel table-wrap">
        <h3>Daftar Review Buku</h3>
        <p id="resultInfo" style="margin-bottom:10px;color:var(--text-muted);"></p>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama Buku</th>
              <th>Reviewer</th>
              <th>Rating</th>
              <th>Review</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="reviewTableBody"></tbody>
        </table>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:14px;">
          <p id="reviewPaginationInfo" style="margin:0;color:var(--text-muted);"></p>
          <nav aria-label="Review pagination">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" id="reviewPrevItem"><button class="page-link" id="reviewPrevBtn" type="button">Previous</button></li>
              <li class="page-item disabled"><span class="page-link" id="reviewPageLabel">1</span></li>
              <li class="page-item" id="reviewNextItem"><button class="page-link" id="reviewNextBtn" type="button">Next</button></li>
            </ul>
          </nav>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const pageSize =4 ;
      let currentPage = 1;
      const reviewData = [
        { id: 1, book: "Makrifat Daun", reviewer: "Rahma", rating: 5, review: "Bahasanya dalam dan sangat reflektif." },
        { id: 2, book: "Makrifat Daun", reviewer: "Bima", rating: 4, review: "Bagus untuk diskusi komunitas." },
        { id: 3, book: "Dilarang Mencintai Bunga-Bunga", reviewer: "Nanda", rating: 5, review: "Puitis dan kritik sosialnya kuat." },
        { id: 4, book: "Perubahan Sosial Dalam Masyarakat", reviewer: "Ayu", rating: 3, review: "Isinya padat, butuh fokus." },
        { id: 5, book: "Identitas Politik Umat Islam", reviewer: "Rizky", rating: 4, review: "Relevan untuk kajian politik." },
        { id: 6, book: "Pulang", reviewer: "Dita", rating: 4, review: "Alurnya cepat dan emosional." },
        { id: 7, book: "Bumi Manusia", reviewer: "Hadi", rating: 5, review: "Klasik yang wajib dibaca." },
        { id: 8, book: "Laut Bercerita", reviewer: "Nisa", rating: 5, review: "Sangat menyentuh dan kuat." },
        { id: 9, book: "Filosofi Teras", reviewer: "Wahyu", rating: 4, review: "Praktis untuk self improvement." },
        { id: 10, book: "Atomic Habits", reviewer: "Rara", rating: 5, review: "Terapannya mudah dipahami." },
        
      ];

      const reviewTableBody = document.getElementById("reviewTableBody");
      const resultInfo = document.getElementById("resultInfo");
      const reviewPaginationInfo = document.getElementById("reviewPaginationInfo");
      const reviewPageLabel = document.getElementById("reviewPageLabel");
      const prevBtn = document.getElementById("reviewPrevBtn");
      const nextBtn = document.getElementById("reviewNextBtn");
      const prevItem = document.getElementById("reviewPrevItem");
      const nextItem = document.getElementById("reviewNextItem");
      const bookFilter = document.getElementById("bookFilter");
      const filterForm = document.getElementById("filterForm");
      const resetFilter = document.getElementById("resetFilter");

      function renderStars(rating) {
        let stars = "";
        for (let i = 1; i <= 5; i += 1) {
          stars += i <= rating ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
        }
        return stars;
      }

      function getFilteredData() {
        const keyword = bookFilter.value.trim().toLowerCase();
        if (!keyword) return reviewData;
        return reviewData.filter(function (item) {
          return item.book.toLowerCase().includes(keyword);
        });
      }

      function renderTable() {
        const filteredData = getFilteredData();
        const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * pageSize;
        const currentData = filteredData.slice(start, start + pageSize);

        resultInfo.textContent = "Total review: " + filteredData.length;

        if (!currentData.length) {
          reviewTableBody.innerHTML = '<tr><td colspan="6">Tidak ada review yang cocok dengan filter.</td></tr>';
        } else {
          reviewTableBody.innerHTML = currentData.map(function (item) {
            return "<tr>" +
              "<td>RV-" + String(item.id).padStart(3, "0") + "</td>" +
              "<td>" + item.book + "</td>" +
              "<td>" + item.reviewer + "</td>" +
              '<td><span class="badge warning">' + renderStars(item.rating) + "</span></td>" +
              "<td>" + item.review + "</td>" +
              '<td><div class="actions"><button class="btn btn-danger btn-delete" type="button" data-id="' + item.id + '">Hapus</button></div></td>' +
              "</tr>";
          }).join("");
        }

        reviewPaginationInfo.textContent = "Halaman " + currentPage + " dari " + totalPages;
        reviewPageLabel.textContent = currentPage + " / " + totalPages;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        prevItem.classList.toggle("disabled", currentPage === 1);
        nextItem.classList.toggle("disabled", currentPage === totalPages);
      }

      function applyFilter(event) {
        if (event) event.preventDefault();
        currentPage = 1;
        renderTable();
      }

      filterForm.addEventListener("submit", applyFilter);
      bookFilter.addEventListener("input", applyFilter);

      resetFilter.addEventListener("click", function () {
        bookFilter.value = "";
        currentPage = 1;
        renderTable();
      });

      prevBtn.addEventListener("click", function () {
        if (currentPage > 1) {
          currentPage -= 1;
          renderTable();
        }
      });

      nextBtn.addEventListener("click", function () {
        const totalPages = Math.max(1, Math.ceil(getFilteredData().length / pageSize));
        if (currentPage < totalPages) {
          currentPage += 1;
          renderTable();
        }
      });

      reviewTableBody.addEventListener("click", function (event) {
        const deleteBtn = event.target.closest(".btn-delete");
        if (!deleteBtn) return;

        const reviewId = Number(deleteBtn.dataset.id);
        const reviewIndex = reviewData.findIndex(function (item) { return item.id === reviewId; });
        if (reviewIndex === -1) return;
        reviewData.splice(reviewIndex, 1);
        renderTable();
      });

      renderTable();
    })();
  </script>
  <script src="../../assets/script/admin/shared-layout.js"></script>
</body>
</html>
