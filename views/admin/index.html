<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Galaxy Digi Book</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/admin/panel.css">
</head>

<body>
    <div class="admin-layout">
            <div id="admin-sidebar"></div>

        <main class="main-content">
            <header class="topbar">
                <h2>Dashboard Admin</h2>
                <p>Kelola data buku, transaksi, laporan, dan pengguna.</p>
            </header>

            <section class="cards">
                <article class="card">
                    <h3>Total Buku</h3>
                    <p>256</p>
                </article>
                <article class="card">
                    <h3>Total Transaksi</h3>
                    <p>1.240</p>
                </article>
                <article class="card">
                    <h3>Total User</h3>
                    <p>893</p>
                </article>
            </section>

            <section class="panel-placeholder">
                <h3>Menu Aktif: Kategori Buku</h3>
                <p>Pilih menu di sebelah kiri untuk mengelola data sesuai kebutuhan.</p>
            </section>
        </main>
    </div>
  <script src="../../assets/script/admin/shared-layout.js"></script>
</body>

</html>
