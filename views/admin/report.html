<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/admin/panel.css">
</head>
<body>
  <div class="admin-layout">
        <div id="admin-sidebar"></div>
    <main class="main-content">
      <header class="topbar"><h2>Report</h2><p>Laporan penjualan dan performa kategori buku.</p></header>
      <section class="cards">
        <article class="card"><h3>Penjualan Bulan Ini</h3><p>Rp 24.500.000</p></article>
        <article class="card"><h3>Order Selesai</h3><p>189</p></article>
        <article class="card"><h3>Rata-rata Order</h3><p>Rp 129.000</p></article>
      </section>
      <section class="panel table-wrap">
        <h3>Top Kategori</h3>
        <table>
          <thead><tr><th>Kategori</th><th>Order</th><th>Pendapatan</th><th>Growth</th></tr></thead>
          <tbody>
            <tr><td>Sastra Indonesia</td><td>76</td><td>Rp 8.450.000</td><td><span class="badge success">+18%</span></td></tr>
            <tr><td>Filsafat</td><td>52</td><td>Rp 7.120.000</td><td><span class="badge success">+11%</span></td></tr>
            <tr><td>Sosiologi</td><td>39</td><td>Rp 4.870.000</td><td><span class="badge warning">+4%</span></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="../../assets/script/admin/shared-layout.js"></script>
</body>
</html>
