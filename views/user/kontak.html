<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - Galaxy Digi Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/user/kontak.css">
    <link rel="stylesheet" href="../../assets/css/user/layout-shared.css">
</head>

<body data-page="kontak">
    <div id="site-navbar"></div>

    <main class="contact-page py-5">
        <section class="container">
            <div class="hero-box mb-4">
                <h1>Kontak Kami</h1>
                <p>Hubungi tim Galaxy Digi Book untuk pertanyaan, kerja sama, atau bantuan pembelian.</p>
            </div>

            <div class="row g-4">
                <div class="col-lg-5">
                    <div class="contact-card">
                        <h3>Informasi Kontak</h3>
                        <ul class="contact-list">
                            <li><i class="fa-solid fa-envelope"></i> support@bookstore.id</li>
                            <li><i class="fa-solid fa-phone"></i> +62 812-3456-7890</li>
                            <li><i class="fa-solid fa-location-dot"></i> Miko Mall Lt. 1, Bandung</li>
                            <li><i class="fa-regular fa-clock"></i> Setiap Hari, 10:00 - 22:00 WIB</li>
                        </ul>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="contact-card">
                        <h3>Kirim Pesan</h3>
                        <form class="contact-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nama</label>
                                    <input type="text" class="form-control" placeholder="Nama lengkap">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" placeholder="nama@email.com">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Subjek</label>
                                    <input type="text" class="form-control" placeholder="Subjek pesan">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Pesan</label>
                                    <textarea class="form-control" rows="5" placeholder="Tulis pesan kamu..."></textarea>
                                </div>
                                <div class="col-12">
                                    <button type="button" class="send-btn">Kirim Pesan</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/script/user/shared-layout.js"></script>
</body>

</html>
